<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Prayer Times – Dhaka</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    </script>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-item">রমজান</a>
                <a href="prayer.html" class="nav-item active">নামাজ</a>
                <a href="tasbih.html" class="nav-item">তাসবিহ</a>
            </div>
            <div class="nav-right">
                <div id="currentTime" class="nav-item"></div>
                <button id="darkToggle" class="nav-item icon-btn" aria-label="Toggle dark mode">
                    <span id="themeIcon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.02-.67.05-1A9 9 0 1 0 22 13.74c-.33.03-.66.05-1 .05z" />
                        </svg>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Hero Active Card -->
        <div class="prayer-hero">
            <div class="location">📍 Dhaka, Bangladesh</div>
            <h2 id="currentPrayerLabel">চলতি নামাজ: লোড হচ্ছে...</h2>
            <div class="countdown-time" id="prayerCountdown">পরবর্তী নামাজ: লোড হচ্ছে...</div>
        </div>

        <!-- Timetable Grid -->
        <div class="prayer-grid" id="prayerGrid">
            <div style="grid-column: 1 / -1; text-align: center; font-weight: 600; color: #6b7280; padding: 40px;">
                নামাজের সময়সূচি লোড হচ্ছে...
            </div>
        </div>
    </div>

    <script>
        /* ---------- HELPERS ---------- */
        function to12(time24) {
            let [h, m] = time24.split(":");
            h = parseInt(h, 10);
            let ap = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return `${h}:${m} ${ap}`;
        }

        function toBangla(num) {
            const map = ["০", "১", "২", "৩", "৪", "৫", "৬", "৭", "৮", "৯"];
            return num.toString().split("").map(d => map[d] ?? d).join("");
        }

        function parseTime(timeStr, targetDate = new Date()) {
            const [h, m] = timeStr.split(":");
            const d = new Date(targetDate);
            d.setHours(parseInt(h, 10), parseInt(m, 10), 0, 0);
            return d;
        }

        /* ---------- SVG ICONS ---------- */
        const icons = {
            "ফজর": `<svg viewBox="0 0 24 24"><path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="9.17" y2="12.25"/><line x1="19.78" y1="10.22" x2="14.83" y2="12.25"/><line x1="1" y1="18" x2="23" y2="18"/></svg>`,
            "সূর্যোদয়": `<svg viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/><path d="M2 22h20"/><path d="M12 2v4"/><path d="M4.93 4.93l1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>`,
            "যোহর": `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 18.36l1.42-1.42M18.36 4.22l1.42-1.42"/></svg>`,
            "আসর": `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 2v3M4.22 4.22l2.12 2.12M1 12h3"/><path d="M17 17l5 5"/></svg>`,
            "মাগরিব": `<svg viewBox="0 0 24 24"><path d="M12 13a5 5 0 0 0-5 5h10a5 5 0 0 0-5-5z"/><path d="M2 21h20"/><path d="M12 2v6"/><path d="m4.93 7.93 1.41 1.41"/><path d="m19.07 7.93-1.41 1.41"/></svg>`,
            "এশা": `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
        };

        /* ---------- FETCH PRAYER TIMES ---------- */
        fetch("https://api.aladhan.com/v1/timingsByCity?city=Dhaka&country=Bangladesh&method=1&school=1")
            .then(res => res.json())
            .then(data => {
                const t = data.data.timings;
                const prayers = [
                    { name: "ফজর", time: t.Fajr },
                    { name: "সূর্যোদয়", time: t.Sunrise },
                    { name: "যোহর", time: t.Dhuhr },
                    { name: "আসর", time: t.Asr },
                    { name: "মাগরিব", time: t.Maghrib },
                    { name: "এশা", time: t.Isha }
                ];

                updatePrayerDashboard(prayers);
            });

        /* ---------- DASHBOARD CONTROLLER ---------- */
        function updatePrayerDashboard(prayersData) {
            function tick() {
                const now = new Date();
                
                // Construct today's date objects
                const todayPrayers = prayersData.map(p => ({
                    name: p.name,
                    time: p.time,
                    date: parseTime(p.time)
                }));
                
                let currentIndex = -1;
                let nextIndex = -1;
                let targetDate = null;
                
                if (now < todayPrayers[0].date) {
                    // Before Fajr: current is Esha (from yesterday), next is Fajr
                    currentIndex = 5; // Isha
                    nextIndex = 0; // Fajr
                    targetDate = todayPrayers[0].date;
                } else if (now >= todayPrayers[5].date) {
                    // After Isha: current is Isha, next is tomorrow's Fajr
                    currentIndex = 5; // Isha
                    nextIndex = 0; // Fajr
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    targetDate = parseTime(todayPrayers[0].time, tomorrow);
                } else {
                    // Between Fajr and Isha
                    for (let i = 0; i < 5; i++) {
                        if (now >= todayPrayers[i].date && now < todayPrayers[i+1].date) {
                            currentIndex = i;
                            nextIndex = i + 1;
                            targetDate = todayPrayers[i+1].date;
                            break;
                        }
                    }
                }
                
                // Update Hero Card
                const currentPrayer = todayPrayers[currentIndex];
                const nextPrayer = todayPrayers[nextIndex];
                
                document.getElementById("currentPrayerLabel").innerText = `চলতি নামাজ: ${currentPrayer.name}`;
                
                // Compute countdown
                const diff = targetDate - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                
                const pad = (num) => num.toString().padStart(2, '0');
                document.getElementById("prayerCountdown").innerText = `পরবর্তী নামাজ: ${nextPrayer.name} (${toBangla(pad(h))}:${toBangla(pad(m))}:${toBangla(pad(s))})`;
                
                // Render Cards
                let cardsHtml = "";
                todayPrayers.forEach((p, i) => {
                    let stateClass = "";
                    let badgeText = "";
                    
                    if (i === currentIndex) {
                        stateClass = "active";
                        badgeText = "চলমান";
                    } else if (i === nextIndex) {
                        stateClass = "next";
                        badgeText = "পরবর্তী";
                    }
                    
                    cardsHtml += `
                        <div class="prayer-card ${stateClass}">
                            <div class="prayer-card-info">
                                <div class="prayer-card-name">${p.name}</div>
                                <div class="prayer-card-time">${toBangla(to12(p.time))}</div>
                            </div>
                            ${badgeText ? `<span class="prayer-card-badge">${badgeText}</span>` : ""}
                        </div>
                    `;
                });
                
                document.getElementById("prayerGrid").innerHTML = cardsHtml;
            }
            
            tick();
            setInterval(tick, 1000);
        }
    </script>

</body>

</html>
