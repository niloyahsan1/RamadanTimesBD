<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    </script>

    <div class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="nav-item">রমজান</a>
                <a href="prayer.html" class="nav-item">নামাজ</a>
                <a href="tasbih.html" class="nav-item active">তাসবিহ</a>
            </div>
            <div class="nav-right">
                <div id="currentTime" class="nav-item"></div>
                <button id="darkToggle" class="nav-item icon-btn" aria-label="Toggle dark mode">
                    <span id="themeIcon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.02-.67.05-1A9 9 0 1 0 22 13.74c-.33.03-.66.05-1 .05z" />
                        </svg>
                    </span>
                </button>
            </div>
        </div>
    </div>

    <div class="container">

        <h2>ডিজিটাল তাসবিহ</h2>

        <!-- Session Statistics -->
        <div class="tasbih-stats">
            <div class="tasbih-stats-card">
                <div class="label">আজকের মোট জিকর</div>
                <div class="value" id="sessionTotal">০</div>
            </div>
            <div class="tasbih-stats-card">
                <div class="label">বর্তমান চক্র</div>
                <div class="value" id="cycleTotal">১ম</div>
            </div>
        </div>

        <!-- Zikr Selector Tabs -->
        <div class="zikr-tabs" id="zikrTabs"></div>

        <!-- Progress Ring Tapper -->
        <div class="progress-ring" id="circle" title="জপ করতে এখানে চাপুন">
            <svg width="280" height="280" viewBox="0 0 280 280">
                <circle class="bg" cx="140" cy="140" r="120" />
                <circle class="progress" id="progressCircle" cx="140" cy="140" r="120" />
            </svg>

            <div class="circle-content">
                <div class="zikr" id="zikrText">সুবহানাল্লাহ</div>
                <div class="zikr-meaning" id="zikrMeaning">আল্লাহ অতি পবিত্র ও মহিমান্বিত</div>
                <div class="count" id="counter">0/৩৩</div>
            </div>
        </div>

        <div class="complete-msg" id="completeMsg">
            আলহামদুলিল্লাহ! ১০০টি জিকর চক্র সম্পূর্ণ হয়েছে 🤍
        </div>

        <!-- Reset Button -->
        <button class="reset-btn" id="resetBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="feather feather-rotate-ccw"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            কাউন্টার রিসেট করুন
        </button>

    </div>

    <script>
        const zikrList = [
            { name: "সুবহানাল্লাহ", max: 33, meaning: "আল্লাহ অতি পবিত্র ও মহিমান্বিত" },
            { name: "আলহামদুলিল্লাহ", max: 33, meaning: "সকল প্রশংসা একমাত্র আল্লাহর জন্য" },
            { name: "আল্লাহু আকবার", max: 34, meaning: "আল্লাহ সবচেয়ে মহান ও সর্বশ্রেষ্ঠ" }
        ];

        let currentZikr = 0;
        let count = 0;
        let sessionTotal = 0;
        let cycleTotal = 1;
        let isCompleted = false;

        const circle = document.getElementById("circle");
        const zikrText = document.getElementById("zikrText");
        const zikrMeaning = document.getElementById("zikrMeaning");
        const counter = document.getElementById("counter");
        const progressCircle = document.getElementById("progressCircle");
        const completeMsg = document.getElementById("completeMsg");
        const zikrTabsContainer = document.getElementById("zikrTabs");
        const sessionTotalEl = document.getElementById("sessionTotal");
        const cycleTotalEl = document.getElementById("cycleTotal");

        const circumference = 2 * Math.PI * 120;
        progressCircle.style.strokeDasharray = circumference;

        function toBangla(num) {
            const map = ["০", "১", "২", "৩", "৪", "৫", "৬", "৭", "৮", "৯"];
            return num.toString().split("").map(d => map[d] ?? d).join("");
        }

        function renderTabs() {
            let tabsHtml = "";
            zikrList.forEach((z, idx) => {
                const activeClass = idx === currentZikr ? "active" : "";
                tabsHtml += `<button class="tab-btn ${activeClass}" onclick="switchZikr(${idx})">${z.name}</button>`;
            });
            zikrTabsContainer.innerHTML = tabsHtml;
        }

        window.switchZikr = function(idx) {
            if (isCompleted) return;
            currentZikr = idx;
            count = 0;
            updateUI();
        };

        function updateProgress() {
            const max = zikrList[currentZikr].max;
            const percent = count / max;
            const offset = circumference - (percent * circumference);
            progressCircle.style.strokeDashoffset = offset;
        }

        function updateUI() {
            const zikr = zikrList[currentZikr];
            zikrText.innerText = zikr.name;
            zikrMeaning.innerText = zikr.meaning;
            counter.innerText = `${toBangla(count)}/${toBangla(zikr.max)}`;
            sessionTotalEl.innerText = toBangla(sessionTotal);
            cycleTotalEl.innerText = `${toBangla(cycleTotal)}ম`;
            updateProgress();
            renderTabs();
        }

        circle.addEventListener("click", () => {
            if (isCompleted) {
                // Restart for another cycle!
                isCompleted = false;
                completeMsg.style.display = "none";
                circle.classList.remove("disabled");
                currentZikr = 0;
                count = 0; // Starts from 1 below
                cycleTotal++;
            }

            count++;
            sessionTotal++;

            if (navigator.vibrate) {
                navigator.vibrate(35);
            }

            const max = zikrList[currentZikr].max;

            if (count >= max) {
                if (currentZikr === zikrList.length - 1) {
                    // Completed cycle (100 counts)
                    count = max;
                    updateUI();
                    isCompleted = true;
                    completeMsg.style.display = "block";
                    circle.classList.add("disabled");
                    return;
                } else {
                    // Auto advance to next zikr
                    currentZikr++;
                    count = 0;
                }
            }

            updateUI();
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
            currentZikr = 0;
            count = 0;
            sessionTotal = 0;
            cycleTotal = 1;
            isCompleted = false;
            completeMsg.style.display = "none";
            circle.classList.remove("disabled");
            updateUI();
        });

        // Initialize
        updateUI();
    </script>

</body>

</html>
